name: CI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PowerShell
        uses: PowerShell/PowerShell@v1
        with:
          version: '5.1'

      - name: Install Invoke-Build
        shell: pwsh
        run: |
          Install-Module InvokeBuild -Force -Scope CurrentUser -Repository PSGallery

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -Repository PSGallery

      - name: Run build
        shell: pwsh
        run: |
          Invoke-Build